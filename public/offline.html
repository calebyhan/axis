<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0A0A" />
    <title>Axis Offline</title>
    <style>
      :root {
        color-scheme: dark;
        background: #0a0a0a;
        color: #ffffff;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.1), transparent 48%),
          #0a0a0a;
      }

      main {
        width: min(100%, 360px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 28px;
        padding: 28px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02));
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 24px 80px rgba(0, 0, 0, 0.45);
      }

      p {
        margin: 0;
        color: rgba(255, 255, 255, 0.58);
        line-height: 1.5;
      }

      .kicker {
        margin-bottom: 10px;
        color: rgba(255, 255, 255, 0.42);
        font-size: 11px;
        letter-spacing: 0.28em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 32px;
        letter-spacing: -0.06em;
        line-height: 0.95;
      }

      a {
        display: inline-flex;
        margin-top: 22px;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        border-radius: 16px;
        padding: 0 18px;
        background: #ffffff;
        color: #0a0a0a;
        font-size: 14px;
        font-weight: 650;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="kicker">Axis</div>
      <h1>Offline mode</h1>
      <p>Previously opened screens may still work. Reconnect to sync new data and load fresh training history.</p>
      <a href="/dashboard">Try Dashboard</a>
    </main>
  </body>
</html>
